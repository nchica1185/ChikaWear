<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CHIKAWEAR | Stripe Demo</title>
  <style>
    body{font-family:system-ui,Segoe UI,Arial,sans-serif;background:#0b0b0c;color:#fff;margin:0}
    .wrap{max-width:820px;margin:48px auto;padding:0 16px}
    .card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:18px}
    h1{margin:0 0 10px}
    p{color:rgba(255,255,255,.78);line-height:1.5}
    button{background:#e11d2e;color:#fff;border:none;border-radius:12px;padding:12px 16px;font-weight:800;cursor:pointer}
    button:disabled{opacity:.6;cursor:not-allowed}
    code{background:rgba(255,255,255,.08);padding:2px 6px;border-radius:8px}
    .row{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px}
    .muted{font-size:13px;color:rgba(255,255,255,.65)}
    a{color:#fff}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Stripe Checkout (Demo)</h1>
      <p>Este ejemplo crea una sesión de Stripe desde el backend y abre el link de pago.</p>
      <div class="row">
        <button id="payBtn">Pagar prueba</button>
        <a href="index.html" class="muted">Volver a la tienda</a>
      </div>
      <p class="muted" id="msg" style="margin-top:12px"></p>
      <p class="muted">Backend esperado en <code>http://localhost:3000</code> y <code>STRIPE_SECRET_KEY</code> en <code>backend/.env</code>.</p>
    </div>
  </div>
  <script>
    const API = "http://localhost:3000";
    const btn = document.getElementById("payBtn");
    const msg = document.getElementById("msg");

    async function run(){
      btn.disabled = true;
      msg.textContent = "Creando sesión de pago...";
      try{
        const productos = await fetch(API + "/productos").then(r=>r.json());
        if(!Array.isArray(productos) || productos.length===0){
          throw new Error("No hay productos en /productos");
        }
        const first = productos[0];
        const payload = {
          cliente: "Cliente Demo",
          telefono: "3000000000",
          direccion: "Dirección demo",
          departamento: "Quindío",
          ciudad: "Armenia",
          envio: 14000,
          productos: [{ id: first.id || first._id, nombre: first.nombre, precio: first.precio }],
          total: (Number(first.precio)||0) + 14000
        };
        const res = await fetch(API + "/checkout",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if(!res.ok){
          throw new Error(data && data.error ? data.error : "No se pudo crear la sesión");
        }
        if(!data.url) throw new Error("Respuesta sin url");
        msg.textContent = "Abriendo Stripe Checkout...";
        window.location.href = data.url;
      }catch(e){
        console.error(e);
        msg.textContent = "Error: " + e.message;
        btn.disabled = false;
      }
    }

    btn.addEventListener("click", run);
  </script>
</body>
</html>
